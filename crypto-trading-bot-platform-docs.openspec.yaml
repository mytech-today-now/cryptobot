        - "Tamper-evident (cryptographic hashing)"
        - "Searchable and exportable"
        - "Access controls (who can view logs)"

# ============================================================================
# SECTION 11: DOCUMENT GENERATION WORKFLOW
# ============================================================================
generation_workflow:
  description: |
    Defines the sequence and dependencies for generating documentation artifacts.

  phases:
    - phase: 1
      name: "Epic and User Stories"
      duration: "Week 0 (Pre-Sprint 1)"
      outputs:
        - "Epic specification (already exists)"
        - "14 user story documents"
        - "Story dependency matrix"

    - phase: 2
      name: "Technical Design Documents"
      duration: "Week 0-1 (Before Implementation)"
      outputs:
        - "8 Architecture Decision Records"
        - "5 API specifications (OpenAPI)"
        - "4 Database schema documents"
        - "3 System architecture diagrams"
        - "6 Exchange integration specifications"

    - phase: 3
      name: "Sprint Planning Documents"
      duration: "Start of each sprint"
      outputs:
        - "9 sprint backlog documents"
        - "9 sprint goal documents"
        - "Capacity planning spreadsheets"
        - "Task breakdown for each story"

    - phase: 4
      name: "Development Artifacts"
      duration: "During development (Sprints 1-9)"
      outputs:
        - "Code documentation (inline and API docs)"
        - "README files (main, backend, frontend)"
        - "Configuration documentation (dev, staging, prod)"
        - "5 operational runbooks"

    - phase: 5
      name: "Testing Documentation"
      duration: "During development and QA (Sprints 1-9)"
      outputs:
        - "14 test plans (one per story)"
        - "100+ test cases"
        - "Test data sets (JSON files)"
        - "Bug report template"

    - phase: 6
      name: "Quality Assurance Documents"
      duration: "During QA and code review (Sprints 1-9)"
      outputs:
        - "Definition of Done checklist"
        - "14 acceptance test result documents"
        - "Code review checklist"
        - "14 performance test result documents"

    - phase: 7
      name: "Deployment & Operations Documents"
      duration: "Before each deployment (Sprints 6-9)"
      outputs:
        - "3 deployment plans (staging, production, hotfix)"
        - "9 release notes (one per sprint)"
        - "3 rollback procedures"
        - "Monitoring and alerting setup guides"

    - phase: 8
      name: "User-Facing Documentation"
      duration: "Sprints 7-9 (UI development phase)"
      outputs:
        - "4 user guides"
        - "API documentation (Swagger/OpenAPI)"
        - "5 video tutorials"
        - "FAQ document"
        - "Change management announcements"

    - phase: 9
      name: "Project Management Documents"
      duration: "Ongoing throughout project"
      outputs:
        - "9 sprint retrospectives"
        - "9 burndown charts"
        - "Quarterly velocity reports"
        - "9 risk registers (updated each sprint)"
        - "18 stakeholder status reports (weekly)"

    - phase: 10
      name: "Compliance & Governance Documents"
      duration: "Sprints 6-9 (before production launch)"
      outputs:
        - "Security audit report"
        - "3 compliance checklists (GDPR, CCPA, SOC2)"
        - "Data privacy impact assessments"
        - "Audit trail specification"

# ============================================================================
# SECTION 12: DOCUMENT TEMPLATES AND STANDARDS
# ============================================================================
document_standards:
  description: |
    Common standards, formatting rules, and reusable templates for all documents.

  markdown_standards:
    heading_levels:
      - "# for document title (H1)"
      - "## for major sections (H2)"
      - "### for subsections (H3)"
      - "#### for sub-subsections (H4)"

    formatting:
      - "Use **bold** for emphasis"
      - "Use *italics* for technical terms on first use"
      - "Use `code` for inline code, commands, file names"
      - "Use ``` for code blocks with language specification"
      - "Use > for blockquotes and important notes"
      - "Use - for unordered lists"
      - "Use 1. for ordered lists"
      - "Use [ ] for task lists/checklists"

    tables:
      - "Use GitHub Flavored Markdown table syntax"
      - "Include header row with alignment"
      - "Keep tables readable in plain text"

    links:
      - "Use descriptive link text (not 'click here')"
      - "Use relative links for internal documents"
      - "Use absolute links for external resources"

  metadata_header:
    required_fields:
      - "Document Title"
      - "Document Type"
      - "Document Version"
      - "Last Updated"
      - "Document Owner"
      - "Related Stories/Epics"

    optional_fields:
      - "Review Cycle"
      - "Confidentiality Level"
      - "Approvers"
      - "Distribution List"

  version_control:
    semantic_versioning:
      - "Major version: Breaking changes or complete rewrites"
      - "Minor version: New sections or significant additions"
      - "Patch version: Corrections, clarifications, minor updates"

    change_log:
      format: |
        ## Change Log

        ### Version {version} - {date}
        - {Change description}
        - {Change description}

  diagram_standards:
    mermaid_diagrams:
      supported_types:
        - "flowchart"
        - "sequenceDiagram"
        - "classDiagram"
        - "erDiagram"
        - "gantt"
        - "gitGraph"

      style_guide:
        - "Use consistent node shapes for similar concepts"
        - "Use colors sparingly for emphasis"
        - "Include legend for complex diagrams"
        - "Keep diagrams focused (one concept per diagram)"

  code_examples:
    languages:
      - "python"
      - "javascript"
      - "typescript"
      - "sql"
      - "yaml"
      - "json"
      - "bash"

    standards:
      - "Include comments explaining key steps"
      - "Use realistic variable names"
      - "Show error handling"
      - "Include expected output"

