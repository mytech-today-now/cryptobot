    - name: "test-case-generator"
      description: "Generate test case templates from acceptance criteria"
      input: "User story acceptance criteria"
      output: "test-cases-{story_id}-{test_type}.md"
      technology: "Python script"

  documentation_tools:
    - name: "MkDocs"
      purpose: "Static site generator for documentation"
      features:
        - "Markdown support"
        - "Search functionality"
        - "Responsive theme"
        - "Version switching"

    - name: "Swagger UI"
      purpose: "Interactive API documentation"
      features:
        - "Try-it-out functionality"
        - "Request/response examples"
        - "Authentication testing"

    - name: "Mermaid"
      purpose: "Diagram generation from text"
      features:
        - "Flowcharts"
        - "Sequence diagrams"
        - "ER diagrams"
        - "Gantt charts"

  validation_tools:
    - name: "markdownlint"
      purpose: "Markdown style and syntax checking"

    - name: "vale"
      purpose: "Prose linting and style guide enforcement"

    - name: "openapi-validator"
      purpose: "OpenAPI specification validation"

  ci_cd_integration:
    - "Automated documentation build on commit"
    - "Link checking for broken references"
    - "Spell checking"
    - "Documentation versioning"
    - "Automated deployment to documentation site"

