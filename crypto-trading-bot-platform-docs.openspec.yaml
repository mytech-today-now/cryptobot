automation_tooling:
  description: |
    Tools and scripts for automating document generation and maintenance.

  document_generators:
    - name: "user-story-generator"
      description: "Generate user story documents from epic specification"
      input: "JIRA-epic-crypto-trading-bot-platform.md"
      output: "user-story-{story_id}-{title_slug}.md"
      technology: "Python script with Jinja2 templates"

    - name: "api-spec-generator"
