# SECTION 14: MAINTENANCE AND REVIEW
# ============================================================================
maintenance_review:
  description: |
    Processes for keeping documentation up-to-date and relevant.

  review_schedule:
    - document_type: "User Stories"
      frequency: "After each sprint"
      reviewers: ["Product Owner", "Scrum Master"]

    - document_type: "Technical Design Documents"
      frequency: "Quarterly or when architecture changes"
      reviewers: ["Tech Lead", "Senior Developers"]

    - document_type: "API Documentation"
      frequency: "With each API change"
      reviewers: ["Backend Team", "API Consumers"]

    - document_type: "User Guides"
      frequency: "With each feature release"
      reviewers: ["Product Manager", "UX Team", "Support Team"]

    - document_type: "Runbooks"
      frequency: "Quarterly or after incidents"
      reviewers: ["DevOps Team", "On-Call Engineers"]

  update_triggers:
    - "Code changes affecting documented APIs"
    - "New features or functionality"
    - "Bug fixes that change behavior"
    - "Security updates"
    - "User feedback indicating confusion"
    - "Compliance requirement changes"

  deprecation_policy:
    - "Mark deprecated features with warning"
    - "Provide migration guide"
    - "Set removal date (minimum 6 months notice)"
    - "Update all affected documentation"
    - "Notify users via multiple channels"

  archival_policy:
    - "Archive documentation for deprecated features"
    - "Maintain historical versions for reference"
    - "Keep audit trail of document changes"
    - "Retain for compliance period (7 years for financial)"

